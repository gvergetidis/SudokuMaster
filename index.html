<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Master</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <p class="eyebrow">Pick your challenge</p>
        <h1>Sudoku Master</h1>
        <p class="intro">Choose a board and warm up that logic brain.</p>

        <form action="game.html" method="get" id="puzzleForm">
            <input type="hidden" name="puzzle" id="selectedPuzzle">
            <section class="puzzles" id="puzzles"></section>
            <button class="start" type="submit">Start Game</button>
        </form>
    </main>

    <script src="js/sudoku.js"></script>
</body>
</html>
